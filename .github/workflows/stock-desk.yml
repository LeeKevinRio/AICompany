name: stock-desk

on:
  push:
    branches: [product/stock-desk]
    paths:
      - "apps/stock-desk/**"
      - ".github/workflows/stock-desk.yml"
  pull_request:
    branches: [product/stock-desk]
    paths:
      - "apps/stock-desk/**"
      - ".github/workflows/stock-desk.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock-desk/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies (frozen)
        run: uv sync --frozen
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy (strict)
        run: uv run mypy app tests
      - name: Pytest
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock-desk/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/stock-desk/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
