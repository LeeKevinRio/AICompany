name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate agent definitions
        run: python scripts/validate_agents.py
